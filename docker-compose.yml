services:
  bot:
    image: "bot"
    stop_signal: SIGINT
    build:
      context: .
    working_dir: "/usr/src/app/bot"
    volumes:
      - .:/usr/src/app/bot
    command: python3 -m bot
    restart: always
    env_file:
      - ".env"
    environment:
      DB_HOST: pg_database
      DB_PORT: 5432
      DB_WAIT_MAX_ATTEMPTS: 30
      DB_WAIT_DELAY_SECONDS: 2
    depends_on:
      pg_database:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  weblium_app:
    image: "bot"
    stop_signal: SIGINT
    build:
      context: .
    working_dir: "/usr/src/app/bot"
    volumes:
      - .:/usr/src/app/bot
    command: python3 -m infrastructure.api.weblium_app
    restart: always
    env_file:
      - ".env"
    environment:
      DB_HOST: pg_database
      DB_PORT: 5432
      DB_WAIT_MAX_ATTEMPTS: 30
      DB_WAIT_DELAY_SECONDS: 2
      WEBHOOK_HOST: 0.0.0.0
      WEBHOOK_PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      pg_database:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  adminer:
    image: isma97p/adminer-hydra:latest
    restart: always
    depends_on:
      pg_database:
        condition: service_healthy
    environment:
      ADMINER_DESIGN: simple-theme
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - ./infrastructure/adminer/theme/simple-theme/adminer.css:/var/www/html/designs/simple-theme/adminer.css:ro
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  nocodb:
    image: nocodb/nocodb:0.265.1
    restart: always
    depends_on:
      pg_database:
        condition: service_healthy
    ports:
      - "127.0.0.1:8086:8080"
    volumes:
      - nocodb_data:/usr/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  pgadmin:
    image: dpage/pgadmin4:8.14
    restart: always
    depends_on:
      pg_database:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@uavdi.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-546454}
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "127.0.0.1:8084:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infrastructure/pgadmin/servers.json:/pgadmin4/servers.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  pg_database:
    image: postgres:16-alpine
    restart: always
    ports:
      - "127.0.0.1:5439:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-bot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  pg_backup:
    image: postgres:16-alpine
    restart: always
    depends_on:
      pg_database:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_HOST: pg_database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DB_NAME:-bot}
      POSTGRES_USER: ${DB_USER:-postgres}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./scripts/postgres:/scripts:ro
      - pgbackups:/backups
    command: ["/bin/sh", "/scripts/backup_loop.sh"]
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  ##  To enable redis cache uncomment the following lines
