services:
  bot:
    image: "bot"
    stop_signal: SIGINT
    build:
      context: .
    working_dir: "/usr/src/app/bot"
    volumes:
      - .:/usr/src/app/bot
    command: python3 -m bot
    restart: always
    env_file:
      - ".env"
    environment:
      DB_HOST: pg_database
      DB_PORT: 5432
      DB_WAIT_MAX_ATTEMPTS: 30
      DB_WAIT_DELAY_SECONDS: 2
    depends_on:
      pg_database:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  weblium_app:
    image: "bot"
    stop_signal: SIGINT
    build:
      context: .
    working_dir: "/usr/src/app/bot"
    volumes:
      - .:/usr/src/app/bot
    command: python3 -m infrastructure.api.weblium_app
    restart: always
    env_file:
      - ".env"
    environment:
      DB_HOST: pg_database
      DB_PORT: 5432
      DB_WAIT_MAX_ATTEMPTS: 30
      DB_WAIT_DELAY_SECONDS: 2
      WEBHOOK_HOST: 0.0.0.0
      WEBHOOK_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      pg_database:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  adminer:
    image: adminer:4-standalone
    restart: always
    depends_on:
      pg_database:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

  pg_database:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-bot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

