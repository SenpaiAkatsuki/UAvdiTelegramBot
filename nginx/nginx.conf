events {
    worker_connections 1024;
}

http {
    # Replace with your public domain (example: api.uavdi.com.ua)
    server {
        listen 80;
        listen [::]:80;
        server_name YOUR_DOMAIN;

        # Certbot ACME challenge directory
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Simple PostgreSQL panel (Adminer Hydra), proxied from Docker.
        location = /db {
            return 301 /db/;
        }

        location /db/ {
            proxy_pass http://127.0.0.1:8082/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 90s;
        }

        # pgAdmin 4 panel.
        location = /pgadmin {
            return 301 /pgadmin/;
        }

        location /pgadmin/ {
            proxy_pass http://127.0.0.1:8084/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /pgadmin;
            proxy_set_header Connection "";
            proxy_redirect off;
            proxy_read_timeout 90s;
        }

        # Proxy webhook app (docker compose binds it to 127.0.0.1:8080)
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 90s;
        }
    }
}
